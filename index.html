<!DOCTYPE html>
<html lang="en">

<!-- ============================================================
     HEAD
     ============================================================ -->
<head>
    <meta charset="UTF-8">
    <title>DOS Emulator Launcher</title>

    <!-- Favicons -->
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="icon" type="image/gif" href="prompt/animated_favicon1.gif">

    <!-- Styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            padding: 14px 18px;
        }

        .font {
            background: url(prompt/img/f12.7.png) no-repeat 0px 0px;
            width: 12px;
            height: 12px;
            float: left;
            overflow: hidden;
        }
    </style>

    <script>

    // Generate CSS background-position rules for each of the 256 characters
    // in the 16x16 bitmap font sprite sheet (12x12px per glyph).
    function goFontGo() {
        var strStyle = '';
        for (var i = 0; i < 256; i++) {
            var x = i % 16, y = Math.floor(i / 16);
            strStyle += '.f-' + i + '{background-position:-' + (x * 12) + 'px -' + (y * 12) + 'px}';
        }
        strStyle += '.f-n{background-position:0px 0px;float:none;width:0px}';
        var s = document.createElement('style');
        s.appendChild(document.createTextNode(strStyle));
        document.head.appendChild(s);
    }

    // Append character divs for a string. Pass a font image URL to override
    // the default grey (f12.7.png), e.g. white (f12.15.png) for bright text.
    function appendChars(container, str, imgOverride) {
        for (var i = 0; i < str.length; i++) {
            var d = document.createElement('div');
            d.className = 'font f-' + str.charCodeAt(i);
            if (imgOverride) d.style.backgroundImage = 'url(' + imgOverride + ')';
            container.appendChild(d);
        }
    }

    // Append a newline marker div
    function appendNewline(container) {
        var d = document.createElement('div');
        d.className = 'font f-n';
        container.appendChild(d);
    }

    // Render a line from an array of {text, img} segments, then newline
    function renderLine(container, segments) {
        for (var i = 0; i < segments.length; i++) {
            appendChars(container, segments[i].text, segments[i].img || null);
        }
        appendNewline(container);
    }

    var WHITE = 'prompt/img/f12.15.png';
    function g(t) { return { text: t }; }           // grey (default)
    function w(t) { return { text: t, img: WHITE }; } // white (bright)

    var AMIBIOS_TABLE = [
        '횋횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒쨩',
        '쨘 AMIBIOS System Configuration (C) 1985-1991, American Megatrends Inc.,        쨘',
        '횉횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횂횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆횆쨋',
        '쨘 Main Processor    : 80486SX          쨀 Base Memory Size  : 640 KB            쨘',
        '쨘 Numeric Processor : None             쨀 Ext. Memory Size  : 7424 KB           쨘',
        '쨘 Floppy Drive A:   : None             쨀 Hard Disk C: Type : None              쨘',
        '쨘 Floppy Drive B:   : None             쨀 Hard Disk D: Type : None              쨘',
        '쨘 Display Type      : VGA/PGA/EGA      쨀 Serial Port(s)    : None              쨘',
        '쨘 AMIBIOS Date      : 12/12/91         쨀 Parallel Port(s)  : None              쨘',
        '횊횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횕횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒횒쩌'
    ];

    function renderAwardPost(s) {
        renderLine(s, [g('Award Modular BIOS v4.51PG, An Energy Star Ally')]);
        renderLine(s, [g('Copyright (C) 1984-97, Award Software, Inc.')]);
        appendNewline(s);
        renderLine(s, [g('(SSXWUQ@E) Intel i430VX PCIset (TM)')]);
        appendNewline(s);
        renderLine(s, [g('PENTIUM-S CPU at 75MHz')]);
        renderLine(s, [g('Memory Test : 32768K OK')]);
        appendNewline(s);
        renderLine(s, [g('Award Plug and Play BIOS Extension v1.0A')]);
        renderLine(s, [g('Copyright (C) 1997, Award Software, Inc.')]);
        renderLine(s, [g('  Detecting IDE Primary Master ... (Press '), w('F4'), g(' to skip)')]);
        for (var i = 0; i < 7; i++) appendNewline(s);
        renderLine(s, [g('Press '), w('DEL'), g(' to enter SETUP')]);
        renderLine(s, [g('12/10/97-i430VX,UMC86669-2A59GH2BC-00')]);
    }

    function renderAmiBios(s) {
        for (var i = 0; i < AMIBIOS_TABLE.length; i++) {
            renderLine(s, [g(AMIBIOS_TABLE[i])]);
        }
    }

    function init() {
        goFontGo();
        var s = document.getElementById('screen');
        renderAwardPost(s);

        setTimeout(function () {
            s.innerHTML = '';
            renderAmiBios(s);

            setTimeout(function () {
                location.href = 'prompt/index.html';
            }, 4000);
        }, 4000);
    }

    </script>
</head>

<!-- ============================================================
     BODY
     ============================================================ -->
<body onload="init()">
    <noscript>
        <div style="position:fixed;inset:0;z-index:9999;background:#000;color:#c0c0c0;font-family:monospace;font-size:14px;line-height:1.6;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;">
            <div>
                <div style="color:#fff;font-size:18px;margin-bottom:14px;">JavaScript Required</div>
                <div>This site is a client-side DOS terminal and emulator suite.</div>
                <div>It needs JavaScript to run.</div>
                <div style="margin-top:14px;color:#888;">Enable JavaScript and reload.</div>
            </div>
        </div>
    </noscript>
    <div id="screen"></div>
</body>
</html>
