<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>Amstrad CPC</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    /* tiny8bit's CPC emits its native 384x272 framebuffer; scale up at 4:3 */
    #stage { aspect-ratio: 4 / 3; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); position: relative; }
    #canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; background: #000; }
    .err { padding: 20px; color: #fff; font-family: monospace; }
    .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #888; font-family: monospace; pointer-events: none; }
  </style>
  <link rel="stylesheet" href="../_shared/genx-noscript.css">
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <script defer src="../_shared/genx-controls-link.js"></script>
  <script src="../_shared/genx-game-loader.js"></script>
  <link rel="preload" href="cpc.wasm" as="fetch" crossorigin>
</head>
<body>
  <noscript><div class="gx-noscript">
    <div class="gx-noscript-title">JavaScript Required</div>
    <div>This site is a client-side DOS terminal and emulator suite.</div>
    <div>It needs JavaScript to run.</div>
    <div class="gx-noscript-hint">Enable JavaScript and reload.</div>
  </div></noscript>
  <div id="stage">
    <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    <div id="loading" class="loading">Booting Amstrad CPC…</div>
  </div>
  
  <script>
    // PageUp / PageDown → Fire button. floooh's chips library only wires
    // one fire button (BTN0 == BTN1, mapped to Space). We translate both
    // PageUp and PageDown events into synthetic Space events so either
    // key fires. Listener runs at capture phase before sokol's handler
    // sees the original PageUp/PageDown.
    function fireKeyRemap(e) {
      if (e.key === 'PageUp' || e.key === 'PageDown') {
        e.preventDefault();
        e.stopPropagation();
        document.dispatchEvent(new KeyboardEvent(e.type, {
          key: ' ', code: 'Space', keyCode: 32, which: 32,
          bubbles: true, cancelable: true
        }));
      }
    }
    document.addEventListener('keydown', fireKeyRemap, { capture: true });
    document.addEventListener('keyup',   fireKeyRemap, { capture: true });

    (async function () {
      // No ?game= → boot to plain Locomotive BASIC (the CPC's ROM-BASIC
      // prompt on a real machine with no disk inserted). Skip games.json
      // and let cpc.js initialise with empty sokol_args.
      const hasGame = new URLSearchParams(location.search).has('game');
      let game = null;
      const fail = (msg) => { document.getElementById('loading').innerHTML = '<div class="err">' + msg + '</div>'; };

      if (hasGame) {
        const _gx = await window.genxLoadGame('#loading');
        if (!_gx) return;
        game = _gx.game;
        // floooh's tiny8bit CPC reads its config from window.location.search
        // via sokol_args (sargs). Recognised keys (see chips-test cpc.c):
        //   file=<url>      — load this disk/snapshot/tape on boot
        //   type=cpc464     — pick a different model (default CPC 6128)
        //   input=<keys>    — type these keys after load
        //   joystick=...    — enable joystick
        // We rewrite location.search to ?file=<rom> so the WASM picks it
        // up at sargs_setup() time (before any C code runs).
        const newParams = new URLSearchParams();
        // Relative path — floooh's own tiny8bit demos use relative
        // filenames (?file=arkanoid.sna) and emscripten's fetch resolves
        // them against the document URL.
        newParams.set('file', game.rom);
        if (game.input) newParams.set('input', game.input);
        if (game.type)  newParams.set('type',  game.type);
        history.replaceState(null, '', '?' + newParams.toString());
        console.log('[GenX-DOS] CPC params:', '?' + newParams.toString());
      } else {
        document.title = 'Amstrad CPC';
        // Clear any stray search to keep sokol_args clean.
        history.replaceState(null, '', location.pathname);
      }

      // Minimal Module config — floooh's official harness style.
      window.Module = {
        canvas: document.getElementById('canvas'),
        print: (...a) => console.log(a.join(' ')),
        printErr: (...a) => console.warn(a.join(' ')),
        setStatus: () => {},
        monitorRunDependencies: () => {},
        onRuntimeInitialized: () => { document.getElementById('loading').style.display = 'none'; }
      };

      const s = document.createElement('script');
      s.src = 'cpc.js';
      s.async = true;
      s.onerror = () => fail('Failed to load cpc.js');
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
