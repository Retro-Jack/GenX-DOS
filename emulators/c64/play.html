<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commodore 64</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    /* C64 displayed at 4:3 — fits the larger of viewport-bound width/height
       without distorting the native 384x272 framebuffer. */
    #game { aspect-ratio: 4 / 3; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); }
    .err { padding: 20px; color: #fff; font-family: monospace; }
    .loading { padding: 40px; color: #888; text-align: center; font-family: monospace; }
  </style>
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <!-- Preload the VICE core data so the browser starts fetching it in
       parallel with EJS bootstrap instead of waiting until init reaches
       it. EJS picks the "-legacy-" variant by default when no per-core
       report JSON is present (we don't ship one), so that's what we hint. -->
  <link rel="preload" href="ejs/data/cores/vice_x64-legacy-wasm.data" as="fetch" crossorigin>
  <script defer src="../_shared/genx-numlock-warn.js"></script>
</head>
<body>
  <noscript>
    <div style="position:fixed;inset:0;z-index:9999;background:#000;color:#c0c0c0;font-family:monospace;font-size:14px;line-height:1.6;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;">
      <div>
        <div style="color:#fff;font-size:18px;margin-bottom:14px;">JavaScript Required</div>
        <div>This site is a client-side DOS terminal and emulator suite.</div>
        <div>It needs JavaScript to run.</div>
        <div style="margin-top:14px;color:#888;">Enable JavaScript and reload.</div>
      </div>
    </div>
  </noscript>
  <div id="game"><div class="loading">Booting Commodore 64…</div></div>
  <a href="controls.html" target="_blank" rel="noopener" class="gx-controls-link">controls<svg viewBox="0 0 12 12" aria-hidden="true"><path d="M6 1h5v5L8.86 3.85 4.7 8 4 7.3l4.15-4.16zM2 3h2v1H2v6h6V8h1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1"/></svg></a>
  <script>
    (async function () {
      const fail = (msg) => { document.getElementById('game').innerHTML = '<div class="err">' + msg + '</div>'; };
      const params = new URLSearchParams(location.search);
      const key = params.get('game');

      let gameUrl = null;
      let game = null;
      if (key) {
        let games;
        try { games = await (await fetch('games.json')).json(); }
        catch (e) { fail('Failed to load games.json: ' + e.message); return; }
        game = games[key];
        if (!game) { fail('Unknown game key: ' + key); return; }
        document.title = game.title || key;
        gameUrl = game.rom;
      } else {
        document.title = 'Commodore 64';
      }

      // EmulatorJS expects its config as globals set BEFORE loader.js runs.
      window.EJS_player    = '#game';
      // loader.js prepends "../" to any non-absolute EJS_pathtodata, so we
      // build an absolute pathname from the current document URL — works
      // both at the repo root locally and under /GenX-DOS/ on Pages.
      window.EJS_pathtodata = location.pathname.replace(/[^/]*$/, '') + 'ejs/data/';
      window.EJS_core      = 'vice_x64';
      window.EJS_startOnLoaded = true;
      // Real-time IEC loading + audible 1541 drive throughout. We
      // explicitly DON'T enable autoload-warp: the core mutes drive
      // sound during warp, so a fast-but-silent boot defeats the point
      // of having drive sound at all. The initial disk load takes ~30 s
      // but the user hears the drive chunk the whole way through.
      //
      // `vice_drive_sound_emulation` is a PERCENTAGE option (the
      // libretro core accepts values up to 1000% in this build), not
      // on/off — default 20% maps to DriveSoundEmulationVolume=400 (of
      // 4000), so the default is barely audible. 1000% gives the
      // loudest setting available. (Discovered by reading the core's
      // runtime log; the option name pattern is misleading and
      // `'enabled'` is silently rejected with an `invalid core value`
      // warning.)
      //
      // Unified keyboard + numpad-joystick mode: keyboardInput enabled
      // sends typed keys (letters, F-keys, RUN/STOP) to the VICE
      // keyboard callback. vice_joyport_type=1 (Numpad) wires VICE's own
      // joystick port to the keypad — numpad 8/4/6/2 for directions,
      // 0 / 5 for fire. Both layers coexist because they listen on
      // disjoint key sets, so games like Last Ninja (joystick + F-keys
      // for items) and Elite (joystick flight + letters for trading)
      // work end-to-end. Per-game documentation reviewed (lemon64 +
      // c64-wiki): Last Ninja needs F3/F5/Space/F7/Run-Stop, Elite
      // needs ~20 essential letters, Bard's Tale is keyboard-only,
      // Impossible Mission / Wizball / Karate / Beach Head / Ghosts /
      // Hunchback / Forbidden Forest are pure-joystick. The unified
      // option set covers all of them.
      window.EJS_defaultOptions = {
        'vice_drive_true_emulation': 'enabled',
        'vice_drive_sound_emulation': '100%',
        'vice_autoloadwarp': 'disabled',
        'keyboardInput': 'enabled',
        'altKeyboardInput': 'enabled',
        'vice_joyport_type': '1'
      };
      // True forces loader.js to use src/emulator.js (proper ES module
      // with `export default`); the cdn.emulatorjs.org `emulator.min.js`
      // we mirrored isn't an ES module, so `await import(...).default`
      // returns undefined and the loader bails silently.
      window.EJS_DEBUG_XX  = true;
      if (gameUrl) window.EJS_gameUrl = new URL(gameUrl, location.href).href;

      const s = document.createElement('script');
      s.src = 'ejs/data/loader.js';
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
