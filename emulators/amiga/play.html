<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amiga</title>
  <style>
    /* Amiga A500 PAL native is 320x256; displayed at 4:3. */
    #game { aspect-ratio: 4 / 3; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); }
  </style>
  <link rel="stylesheet" href="../_shared/genx-frame.css">
  <link rel="stylesheet" href="../_shared/genx-noscript.css">
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <script defer src="../_shared/genx-controls-link.js"></script>
  <link rel="preload" href="../_shared-ejs/ejs/data/cores/puae-legacy-wasm.data" as="fetch" crossorigin>
  <script src="../_shared-ejs/genx-ejs-boot.js"></script>
</head>
<body>
  <noscript><div class="gx-noscript">
    <div class="gx-noscript-title">JavaScript Required</div>
    <div>This site is a client-side DOS terminal and emulator suite.</div>
    <div>It needs JavaScript to run.</div>
    <div class="gx-noscript-hint">Enable JavaScript and reload.</div>
  </div></noscript>
  <div id="game"><div class="loading">Booting Amiga…</div></div>
  <script>
    genxBootEJS({
      title: 'Amiga',
      coreName: 'amiga',
      biosUrl: 'kick34005.A500',
      defaultOptions: {
        'puae_model': 'A500',
        'puae_statusbar': 'bottom_minimal',
        'puae_statusbar_startup': 'disabled',
        'puae_statusbar_messages': 'disabled',
        'puae_video_standard': 'PAL',
        'puae_cpu_compatibility': 'normal',
        'puae_floppy_speed': '100',
        'puae_analogmouse': 'both',
        'keyboardInput': 'enabled',
        'altKeyboardInput': 'enabled'
      }
    });
  </script>
</body>
</html>
