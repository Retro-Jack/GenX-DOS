<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: monospace; }
      body { display: flex; align-items: center; justify-content: center; }
      #canvas { display: block; max-width: 100vw; max-height: 100vh; }
      .err { padding: 20px; }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="640" height="400"></canvas>
    <script src="es6-promise.js"></script>
    <script src="browserfs.min.js"></script>
    <script src="loader.js"></script>
    <script>
      (async function () {
        const params = new URLSearchParams(location.search);
        const key = params.get("game");
        if (!key) {
          document.body.innerHTML = '<div class="err">Missing ?game=&lt;key&gt; parameter.</div>';
          return;
        }
        let games;
        try {
          games = await (await fetch("games.json")).json();
        } catch (e) {
          document.body.innerHTML = '<div class="err">Failed to load games.json: ' + e.message + "</div>";
          return;
        }
        const game = games[key];
        if (!game) {
          document.body.innerHTML = '<div class="err">Unknown game key: ' + key + "</div>";
          return;
        }
        document.title = game.title || key;

        function locateAdditionalFiles(filename) {
          if (filename === "dosbox.html.mem") {
            return "emulators/em-dosbox/dosbox-sync.mem";
          }
          return "emulators/em-dosbox/" + filename;
        }

        const emu = new Emulator(
          document.getElementById("canvas"),
          null,
          new DosBoxLoader(
            DosBoxLoader.emulatorJS("emulators/em-dosbox/dosbox-sync.js"),
            DosBoxLoader.locateAdditionalEmulatorJS(locateAdditionalFiles),
            DosBoxLoader.nativeResolution(640, 400),
            DosBoxLoader.mountZip("c", DosBoxLoader.fetchFile(game.title, game.zip)),
            DosBoxLoader.startExe(game.exe)
          )
        );
        emu.start({ waitAfterDownloading: true });
      })();
    </script>
  </body>
</html>
