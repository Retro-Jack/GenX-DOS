<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mattel Intellivision</title>
  <style>
    /* Intellivision STIC framebuffer is 159x96 visible (~5:3 raw), the
       1980s NTSC console drove a 4:3 set with non-square pixels —
       letterbox-fit a 4:3 stage inside the viewport. */
    #stage { aspect-ratio: 4 / 3; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); position: relative; }
    #canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; background: #000; }
    .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #888; font-family: monospace; pointer-events: none; }
  </style>
  <link rel="stylesheet" href="../_shared/genx-frame.css">
  <link rel="stylesheet" href="../_shared/genx-noscript.css">
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <script defer src="../_shared/genx-controls-link.js"></script>
  <script src="../_shared/genx-game-loader.js"></script>
  <link rel="preload" href="jzintv.wasm" as="fetch" crossorigin>
</head>
<body>
  <noscript><div class="gx-noscript">
    <div class="gx-noscript-title">JavaScript Required</div>
    <div>This site is a client-side DOS terminal and emulator suite.</div>
    <div>It needs JavaScript to run.</div>
    <div class="gx-noscript-hint">Enable JavaScript and reload.</div>
  </div></noscript>
  <div id="stage">
    <canvas id="canvas" tabindex="0"></canvas>
    <div id="loading" class="loading">Booting Intellivision…</div>
  </div>
  
  <script>
    (async function () {
      const _gx = await window.genxLoadGame('#loading');
      if (!_gx) return;
      const { key, game, fail } = _gx;
      let execBuf, gromBuf, romBuf;
      try {
        [execBuf, gromBuf, romBuf] = await Promise.all([
          fetch('exec.bin').then(r => r.arrayBuffer()),
          fetch('grom.bin').then(r => r.arrayBuffer()),
          fetch(game.rom).then(r => r.arrayBuffer())
        ]);
      } catch (e) { fail('Failed to fetch ROM/BIOS: ' + e.message); return; }

      // Emscripten Module config. jzintv.js exports `Module.launchJzintv`
      // which writes exec.bin, grom.bin, game.<ext> into the WASM FS,
      // then calls Module.callMain with the right argv. `jzintv.data` is
      // emscripten-preloaded automatically (contains the default
      // desk.kbd keyboard mapping).
      window.Module = {
        canvas: document.getElementById('canvas'),
        print: () => {},
        printErr: e => console.warn('[jzintv]', e),
        noInitialRun: true,
        onRuntimeInitialized: function () {
          try {
            Module.launchJzintv(execBuf, gromBuf, romBuf, null, [], null, null, 'int', null);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('canvas').focus();
          } catch (e) {
            fail('jzintv start failed: ' + e.message);
          }
        }
      };

      const s = document.createElement('script');
      s.src = 'jzintv.js';
      s.onerror = () => fail('Failed to load jzintv.js');
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
