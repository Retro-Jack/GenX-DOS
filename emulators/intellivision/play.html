<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mattel Intellivision</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    /* Intellivision STIC framebuffer is 159x96 visible (~5:3 raw), the
       1980s NTSC console drove a 4:3 set with non-square pixels —
       letterbox-fit a 4:3 stage inside the viewport. */
    #stage { aspect-ratio: 4 / 3; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); position: relative; }
    #canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; background: #000; }
    .err { padding: 20px; color: #fff; font-family: monospace; }
    .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #888; font-family: monospace; pointer-events: none; }
  </style>
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <link rel="preload" href="jzintv.wasm" as="fetch" crossorigin>
</head>
<body>
  <noscript>
    <div style="position:fixed;inset:0;z-index:9999;background:#000;color:#c0c0c0;font-family:monospace;font-size:14px;line-height:1.6;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;">
      <div>
        <div style="color:#fff;font-size:18px;margin-bottom:14px;">JavaScript Required</div>
        <div>This site is a client-side DOS terminal and emulator suite.</div>
        <div>It needs JavaScript to run.</div>
        <div style="margin-top:14px;color:#888;">Enable JavaScript and reload.</div>
      </div>
    </div>
  </noscript>
  <div id="stage">
    <canvas id="canvas" tabindex="0"></canvas>
    <div id="loading" class="loading">Booting Intellivision…</div>
  </div>
  <a href="controls.html" target="_blank" rel="noopener" class="gx-controls-link">controls<svg viewBox="0 0 12 12" aria-hidden="true"><path d="M6 1h5v5L8.86 3.85 4.7 8 4 7.3l4.15-4.16zM2 3h2v1H2v6h6V8h1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1"/></svg></a>
  <script>
    (async function () {
      const fail = (msg) => { document.getElementById('loading').innerHTML = '<div class="err">' + msg + '</div>'; };
      const params = new URLSearchParams(location.search);
      const key = params.get('game');
      if (!key) { fail('No game specified.'); return; }

      let games;
      try { games = await (await fetch('games.json')).json(); }
      catch (e) { fail('Failed to load games.json: ' + e.message); return; }
      const game = games[key];
      if (!game) { fail('Unknown game key: ' + key); return; }
      document.title = game.title || key;

      let execBuf, gromBuf, romBuf;
      try {
        [execBuf, gromBuf, romBuf] = await Promise.all([
          fetch('exec.bin').then(r => r.arrayBuffer()),
          fetch('grom.bin').then(r => r.arrayBuffer()),
          fetch(game.rom).then(r => r.arrayBuffer())
        ]);
      } catch (e) { fail('Failed to fetch ROM/BIOS: ' + e.message); return; }

      // Emscripten Module config. jzintv.js exports `Module.launchJzintv`
      // which writes exec.bin, grom.bin, game.<ext> into the WASM FS,
      // then calls Module.callMain with the right argv. `jzintv.data` is
      // emscripten-preloaded automatically (contains the default
      // desk.kbd keyboard mapping).
      window.Module = {
        canvas: document.getElementById('canvas'),
        print: () => {},
        printErr: e => console.warn('[jzintv]', e),
        noInitialRun: true,
        onRuntimeInitialized: function () {
          try {
            Module.launchJzintv(execBuf, gromBuf, romBuf, null, [], null, null, 'int', null);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('canvas').focus();
          } catch (e) {
            fail('jzintv start failed: ' + e.message);
          }
        }
      };

      const s = document.createElement('script');
      s.src = 'jzintv.js';
      s.onerror = () => fail('Failed to load jzintv.js');
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
