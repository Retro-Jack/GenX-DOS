<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commodore Plus/4</title>
  <style>
    /* Plus/4 displayed at 4:3 — TED chip native is 320x200 active, PAL
       overscan brings displayed framebuffer to 4:3. */
    #game { aspect-ratio: 4 / 3; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); }
  </style>
  <link rel="stylesheet" href="../_shared/genx-frame.css">
  <link rel="stylesheet" href="../_shared/genx-noscript.css">
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <script defer src="../_shared/genx-controls-link.js"></script>
  <link rel="preload" href="../_shared-ejs/ejs/data/cores/vice_xplus4-legacy-wasm.data" as="fetch" crossorigin>
  <script defer src="../_shared/genx-numlock-warn.js"></script>
  <script defer src="../_shared/genx-vice-softkeys.js"></script>
  <script src="../_shared-ejs/genx-ejs-boot.js"></script>
</head>
<body>
  <noscript><div class="gx-noscript">
    <div class="gx-noscript-title">JavaScript Required</div>
    <div>This site is a client-side DOS terminal and emulator suite.</div>
    <div>It needs JavaScript to run.</div>
    <div class="gx-noscript-hint">Enable JavaScript and reload.</div>
  </div></noscript>
  <div id="game"><div class="loading">Booting Commodore Plus/4…</div></div>
  <script>
    // Plus/4 — VICE xplus4. Has 64K built in, no RAM expansion option
    // needed (unlike VIC-20). Standard VICE input config.
    genxBootEJS({
      title: 'Commodore Plus/4',
      coreName: 'vice_xplus4',
      defaultOptions: {
        'vice_drive_true_emulation': 'enabled',
        'vice_drive_sound_emulation': '100%',
        'vice_autoloadwarp': 'disabled',
        'keyboardInput': 'enabled',
        'altKeyboardInput': 'enabled',
        'vice_joyport_type': '1'
      }
    });
  </script>
</body>
</html>
