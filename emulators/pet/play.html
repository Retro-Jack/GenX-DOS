<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commodore PET</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    /* PET 4032 displayed at 4:3 — 40-column monochrome (green-on-black)
       on a 9-inch CRT, native framebuffer 320x200, scaled to fit. */
    #game { aspect-ratio: 4 / 3; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); }
    .err { padding: 20px; color: #fff; font-family: monospace; }
    .loading { padding: 40px; color: #888; text-align: center; font-family: monospace; }
  </style>
  <link rel="stylesheet" href="../_shared/genx-noscript.css">
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <script defer src="../_shared/genx-controls-link.js"></script>
  <link rel="preload" href="../_shared-ejs/ejs/data/cores/vice_xpet-legacy-wasm.data" as="fetch" crossorigin>
  <script defer src="../_shared/genx-vice-softkeys.js"></script>
  <script src="../_shared-ejs/genx-ejs-boot.js"></script>
</head>
<body>
  <noscript><div class="gx-noscript">
    <div class="gx-noscript-title">JavaScript Required</div>
    <div>This site is a client-side DOS terminal and emulator suite.</div>
    <div>It needs JavaScript to run.</div>
    <div class="gx-noscript-hint">Enable JavaScript and reload.</div>
  </div></noscript>
  <div id="game"><div class="loading">Booting Commodore PET…</div></div>
  <script>
    // PET — VICE xpet. Default model = 3032 (BASIC 2 chargen); games.json
    // can override with `"model": "4032"` per game (used by PETSCII Robots).
    // No joyport — PET has no joystick. keyboardInput=enabled forwards
    // typed keys to the VICE keyboard callback instead of routing them
    // through EJS's RetroPad gamepad mapper.
    genxBootEJS({
      title: 'Commodore PET',
      coreName: 'vice_xpet',
      defaultOptions: {
        'vice_drive_true_emulation': 'disabled',
        'vice_autoloadwarp': 'enabled',
        'keyboardInput': 'enabled',
        'altKeyboardInput': 'enabled'
      },
      perGame: (game, opts) => {
        opts['vice_pet_model'] = (game && game.model) || '3032';
      }
    });
  </script>
</body>
</html>
