<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game</title>
    <link rel="stylesheet" href="js-dos.css" />
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: monospace; }
      .jsdos-rso { width: 100vw; height: 100vh; }
      .err { padding: 20px; }
    </style>
  </head>
  <body>
    <div class="jsdos-rso" id="dos"></div>
    <script src="js-dos.js"></script>
    <script>
      (async function () {
        const params = new URLSearchParams(location.search);
        const key = params.get("game");
        if (!key) {
          document.body.innerHTML = '<div class="err">Missing ?game=&lt;key&gt; parameter.</div>';
          return;
        }
        let games;
        try {
          games = await (await fetch("games.json")).json();
        } catch (e) {
          document.body.innerHTML = '<div class="err">Failed to load games.json: ' + e.message + "</div>";
          return;
        }
        const game = games[key];
        if (!game) {
          document.body.innerHTML = '<div class="err">Unknown game key: ' + key + "</div>";
          return;
        }
        document.title = game.title || key;
        Dos(document.getElementById("dos"), { url: game.bundle });
      })();
    </script>
  </body>
</html>
