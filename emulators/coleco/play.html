<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ColecoVision</title>
  <style>
    #game { aspect-ratio: 4 / 3; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); }
  </style>
  <link rel="stylesheet" href="../_shared/genx-frame.css">
  <link rel="stylesheet" href="../_shared/genx-noscript.css">
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <script defer src="../_shared/genx-controls-link.js"></script>
  <link rel="preload" href="../_shared-ejs/ejs/data/cores/gearcoleco-legacy-wasm.data" as="fetch" crossorigin>
  <script defer src="../_shared/genx-numlock-warn.js"></script>
  <script src="../_shared-ejs/genx-ejs-boot.js"></script>
</head>
<body>
  <noscript><div class="gx-noscript">
    <div class="gx-noscript-title">JavaScript Required</div>
    <div>This site is a client-side DOS terminal and emulator suite.</div>
    <div>It needs JavaScript to run.</div>
    <div class="gx-noscript-hint">Enable JavaScript and reload.</div>
  </div></noscript>
  <div id="game"><div class="loading">Booting ColecoVision…</div></div>
  <script>
    // ColecoVision — gearcoleco core. BIOS bundle-local. Numpad-as-keypad
    // remap via EJS_defaultControls (gearcoleco puts the 12-key keypad on
    // RetroPad Y/X/L/R/L2/R2/L3/R3 + START/SELECT + analog-stick for 9/0;
    // we override to drive the whole keypad off the PC numpad — period-
    // correct shape).
    genxBootEJS({
      title: 'ColecoVision',
      coreName: 'coleco',
      biosUrl: 'colecovision.rom',
      defaultControls: {
        0: {
          1:  { value: 'numpad 1' },   // Y      → keypad 1
          9:  { value: 'numpad 2' },   // X      → keypad 2
          10: { value: 'numpad 3' },   // L      → keypad 3
          11: { value: 'numpad 4' },   // R      → keypad 4
          12: { value: 'numpad 5' },   // L2     → keypad 5
          13: { value: 'numpad 6' },   // R2     → keypad 6
          14: { value: 'numpad 7' },   // L3     → keypad 7
          15: { value: 'numpad 8' },   // R3     → keypad 8
          3:  { value: 'multiply' },   // START  → keypad * (numpad *)
          2:  { value: 'subtract' },   // SELECT → keypad # (numpad -)
          16: { value: 'numpad 9' },   // LStickX+ → keypad 9
          17: { value: 'numpad 0' }    // LStickX- → keypad 0
        }
      }
    });
  </script>
</body>
</html>
