<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commodore 64</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: monospace; }
    .err { padding: 20px; }
    .loading { padding: 40px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <noscript>
    <div style="position:fixed;inset:0;z-index:9999;background:#000;color:#c0c0c0;font-family:monospace;font-size:14px;line-height:1.6;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;">
      <div>
        <div style="color:#fff;font-size:18px;margin-bottom:14px;">JavaScript Required</div>
        <div>This site is a client-side DOS terminal and emulator suite.</div>
        <div>It needs JavaScript to run.</div>
        <div style="margin-top:14px;color:#888;">Enable JavaScript and reload.</div>
      </div>
    </div>
  </noscript>
  <div class="loading">Booting Commodore 64…</div>
  <script>
    (async function () {
      const fail = (msg) => { document.body.innerHTML = '<div class="err">' + msg + '</div>'; };
      const params = new URLSearchParams(location.search);
      const key = params.get('game');

      // chips C64 (floooh/chips-test) auto-detects format from the file extension
      // and boots the C64 with the file mounted. URL pattern: c64.html?file=URL
      let target = 'c64.html';
      if (key) {
        let games;
        try { games = await (await fetch('games.json')).json(); }
        catch (e) { fail('Failed to load games.json: ' + e.message); return; }
        const game = games[key];
        if (!game) { fail('Unknown game key: ' + key); return; }
        document.title = game.title || key;
        target += '?file=' + encodeURIComponent(game.rom);
      } else {
        document.title = 'Commodore 64';
      }
      location.replace(target);
    })();
  </script>
</body>
</html>
