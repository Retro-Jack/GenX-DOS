<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commodore 128</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    /* C128 — VICE x128 allocates a fat 856×288 (2.78:1) framebuffer
       regardless of vice_c128_video_output. The scaleY hack on the
       canvas + overflow:hidden on #game stretches the rendered content
       to fill 4:3 and clips the empty letterbox bars, mimicking how a
       real C128 monitor stretched VDC's 640x200 buffer to fill 4:3 via
       non-square pixels. */
    #game {
      aspect-ratio: 4 / 3;
      width: min(100vw, calc(100vh * 4 / 3));
      height: min(100vh, calc(100vw * 3 / 4));
      overflow: hidden;
    }
    #game canvas {
      transform-origin: 50% 50%;
      transform: scaleY(calc(2.784 / 1.333));
    }
    .err { padding: 20px; color: #fff; font-family: monospace; }
    .loading { padding: 40px; color: #888; text-align: center; font-family: monospace; }
  </style>
  <link rel="stylesheet" href="../_shared/genx-noscript.css">
  <link rel="stylesheet" href="../_shared/genx-controls-link.css">
  <script defer src="../_shared/genx-controls-link.js"></script>
  <link rel="preload" href="../_shared-ejs/ejs/data/cores/vice_x128-legacy-wasm.data" as="fetch" crossorigin>
  <script defer src="../_shared/genx-numlock-warn.js"></script>
  <script defer src="../_shared/genx-vice-softkeys.js"></script>
  <script src="../_shared-ejs/genx-ejs-boot.js"></script>
</head>
<body>
  <noscript><div class="gx-noscript">
    <div class="gx-noscript-title">JavaScript Required</div>
    <div>This site is a client-side DOS terminal and emulator suite.</div>
    <div>It needs JavaScript to run.</div>
    <div class="gx-noscript-hint">Enable JavaScript and reload.</div>
  </div></noscript>
  <div id="game"><div class="loading">Booting Commodore 128…</div></div>
  <script>
    // C128 — VICE x128 in native mode (vice_c128_go64='disabled' skips
    // C64-compat mode — we have a separate c64 bundle for that). Per-game
    // `video` field in games.json toggles VICII (40-col) vs VDC (80-col);
    // default is VICII.
    genxBootEJS({
      title: 'Commodore 128',
      coreName: 'vice_x128',
      defaultOptions: {
        'vice_c128_go64': 'disabled',
        'vice_aspect_ratio': 'pal',
        'vice_drive_true_emulation': 'enabled',
        'vice_drive_sound_emulation': '100%',
        'vice_autoloadwarp': 'disabled',
        'keyboardInput': 'enabled',
        'altKeyboardInput': 'enabled',
        'vice_joyport_type': '1'
      },
      perGame: (game, opts) => {
        opts['vice_c128_video_output'] = (game && game.video) || 'VICII';
      }
    });
  </script>
</body>
</html>
